{% extends 'base.html' %}

{% block title %}Edit Transaction - Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">

            <!-- Header -->
            <div class="mb-4">
                <h4 class="fw-bold mb-0">
                    <i class="fas fa-edit text-primary me-2"></i>
                    Edit Transaction
                </h4>
                <small class="text-muted">
                    Update your transaction details
                </small>
            </div>

            <form method="POST">
                {% csrf_token %}

                <!-- Type Toggle -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Type</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio"
                                   name="type" value="expense"
                                   id="typeExpense"
                                   {% if expense.type == 'expense' %}checked{% endif %}>
                            <label class="form-check-label text-danger fw-semibold"
                                   for="typeExpense">
                                <i class="fas fa-arrow-down me-1"></i>Expense
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio"
                                   name="type" value="income"
                                   id="typeIncome"
                                   {% if expense.type == 'income' %}checked{% endif %}>
                            <label class="form-check-label text-success fw-semibold"
                                   for="typeIncome">
                                <i class="fas fa-arrow-up me-1"></i>Income
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    {{ form.title }}
                </div>

                <!-- Amount -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Amount ({{ currency }})
                    </label>
                    {{ form.amount }}
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    {{ form.category }}
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Date</label>
                    {{ form.date }}
                </div>

                <!-- Note -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Note <span class="text-muted">(optional)</span>
                    </label>
                    {{ form.note }}
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="fas fa-save me-2"></i>Update Transaction
                    </button>
                    <a href="{% url 'expense_list' %}"
                       class="btn btn-outline-secondary">
                        Cancel
                    </a>
                    <a href="{% url 'delete_expense' expense.id %}"
                       class="btn btn-outline-danger">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
