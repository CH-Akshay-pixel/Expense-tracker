{% extends 'base.html' %}

{% block title %}Password Changed - Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 text-center">

            <!-- Success Icon -->
            <div class="mb-4">
                <div class="rounded-circle bg-success d-inline-flex
                            align-items-center justify-content-center mb-3"
                     style="width:80px; height:80px;">
                    <i class="fas fa-check fa-2x text-white"></i>
                </div>
                <h3 class="fw-bold">Password Changed!</h3>
                <p class="text-muted">
                    Your password has been updated successfully.
                </p>
            </div>

            <!-- Buttons -->
            <a href="{% url 'profile' %}" class="btn btn-primary mb-2">
                <i class="fas fa-user me-2"></i>Go to Profile
            </a>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                <i class="fas fa-sign-in-alt me-2"></i>Login Again
            </a>

        </div>
    </div>
</div>
{% endblock %}
